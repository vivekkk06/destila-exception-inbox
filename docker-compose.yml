services:
  backend:
    build:
      context: ./backend
      dockerfile: backend.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # :z relabels the SELinux context on the bind mount so the container
      # can actually read the host directory (needed on Fedora/RHEL-family
      # systems running SELinux in enforcing mode; omit :z on non-SELinux hosts)
      - ./backend/data:/app/data:z

  frontend:
    build:
      context: ./frontend
      dockerfile: frontend.Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
